<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FAQ Chatbot</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        background-color: #f5f5f5;
    }
    h1 {
        text-align: center;
    }
    #chat-log {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px;
        height: 400px;
        overflow-y: auto;
        margin-bottom: 16px;
    }
    .message {
        margin-bottom: 12px;
    }
    .message.user {
        text-align: right;
    }
    .message.user .bubble {
        background-color: #007aff;
        color: white;
    }
    .message.bot .bubble {
        background-color: #e5e5ea;
        color: black;
    }
    .bubble {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 12px;
        max-width: 80%;
        line-height: 1.4;
    }
    #quick-replies {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
    }
    .quick-reply-btn {
        background-color: white;
        border: 1px solid #007aff;
        color: #007aff;
        border-radius: 16px;
        padding: 6px 14px;
        font-size: 14px;
        cursor: pointer;
    }
    .quick-reply-btn:hover {
        background-color: #007aff;
        color: white;
    }
    .quick-reply-btn:disabled {
        border-color: #999;
        color: #999;
        cursor: not-allowed;
    }
    /* Three dots that pulse one after another, to look like a typing
       indicator instead of a plain "loading" word. */
    .typing-dots {
        display: inline-flex;
        gap: 4px;
    }
    .typing-dots span {
        width: 6px;
        height: 6px;
        background-color: #888;
        border-radius: 50%;
        animation: typing-bounce 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) {
        animation-delay: -0.32s;
    }
    .typing-dots span:nth-child(2) {
        animation-delay: -0.16s;
    }
    @keyframes typing-bounce {
        0%, 80%, 100% {
            transform: scale(0.6);
            opacity: 0.4;
        }
        40% {
            transform: scale(1);
            opacity: 1;
        }
    }
    #input-row {
        display: flex;
        gap: 8px;
    }
    #question-input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }
    #ask-button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background-color: #007aff;
        color: white;
        cursor: pointer;
    }
    #ask-button:disabled {
        background-color: #999;
        cursor: not-allowed;
    }
</style>
</head>
<body>
    <h1>FAQ Chatbot</h1>
    <div id="chat-log"></div>
    <div id="quick-replies"></div>
    <div id="input-row">
        <input type="text" id="question-input" placeholder="Ask a question..." autocomplete="off">
        <button id="ask-button">Ask</button>
    </div>

    <script>
        // A relative path instead of a full URL — since this page is now
        // served BY the same FastAPI server that hosts /ask, "/ask" always
        // means "the /ask endpoint on whatever host served this page."
        // That means this exact file works unchanged whether it's served
        // locally (http://127.0.0.1:8000) or on Render, with no editing.
        const API_URL = "/ask";

        // A handful of our actual FAQ questions, shown as clickable
        // buttons so visitors can see what the bot can answer instead of
        // guessing what to type.
        const QUICK_REPLIES = [
            "What are your business hours?",
            "What is your return policy?",
            "How long does shipping take?",
            "What is your warranty policy?",
            "How can I contact support?",
        ];

        const chatLog = document.getElementById("chat-log");
        const quickRepliesContainer = document.getElementById("quick-replies");
        const questionInput = document.getElementById("question-input");
        const askButton = document.getElementById("ask-button");

        // Tracks the typing-indicator bubble currently on screen (if any),
        // so we can remove exactly that one element once the real answer
        // arrives.
        let typingIndicatorEl = null;

        // Holds every turn of the conversation so far, in the same
        // {role, content} shape the Claude API itself uses. This lives
        // only in the browser's memory — refreshing the page clears it,
        // same as our CLI chatbot's conversation_history did. We send
        // this whole list on every request, since the API has no memory
        // of its own; that's what lets the bot understand follow-up
        // questions like "how long is that warranty?".
        let conversationHistory = [];

        function addMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${sender}`;

            const bubble = document.createElement("span");
            bubble.className = "bubble";
            bubble.textContent = text;

            messageDiv.appendChild(bubble);
            chatLog.appendChild(messageDiv);

            // Scroll the chat log down to the newest message.
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message bot";

            const bubble = document.createElement("span");
            bubble.className = "bubble";
            bubble.innerHTML =
                '<span class="typing-dots"><span></span><span></span><span></span></span>';

            messageDiv.appendChild(bubble);
            chatLog.appendChild(messageDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            typingIndicatorEl = messageDiv;
        }

        function removeTypingIndicator() {
            if (typingIndicatorEl) {
                typingIndicatorEl.remove();
                typingIndicatorEl = null;
            }
        }

        function setControlsDisabled(disabled) {
            askButton.disabled = disabled;
            for (const button of quickRepliesContainer.children) {
                button.disabled = disabled;
            }
        }

        async function askQuestion(question) {
            question = (question ?? questionInput.value).trim();
            if (question === "") {
                return;
            }

            addMessage(question, "user");
            questionInput.value = "";
            setControlsDisabled(true);
            showTypingIndicator();

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: question,
                        history: conversationHistory,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`Server responded with status ${response.status}`);
                }

                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.answer, "bot");

                // Record both sides of this exchange so the NEXT question
                // includes this one as context.
                conversationHistory.push({ role: "user", content: question });
                conversationHistory.push({ role: "assistant", content: data.answer });
            } catch (error) {
                removeTypingIndicator();
                addMessage("Sorry, something went wrong: " + error.message, "bot");
            } finally {
                setControlsDisabled(false);
                questionInput.focus();
            }
        }

        // Build one button per quick-reply question. Clicking a button
        // asks that question immediately, the same as typing it and
        // pressing Enter.
        for (const questionText of QUICK_REPLIES) {
            const button = document.createElement("button");
            button.className = "quick-reply-btn";
            button.textContent = questionText;
            button.addEventListener("click", () => askQuestion(questionText));
            quickRepliesContainer.appendChild(button);
        }

        askButton.addEventListener("click", () => askQuestion());

        questionInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                askQuestion();
            }
        });
    </script>
</body>
</html>
